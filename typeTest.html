<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSOL 소비 유형 테스트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/default.css">
    <link rel="stylesheet" href="./css/qna.css">
    <link rel="stylesheet" href="./css/animation_test.css">
    <link rel="stylesheet" href="./css/result.css">
</head>
<body>
    <div class="container">
        <section id="main">
            <h3>소비 유형 테스트</h3>
            <img src="./img/main.jpg" alt="mainImage">            
            <p>지금 바로 나의 소비 유형 캐릭터를 알아보자!</p>
            <button type="button" class="btn btn-dark btnStart">시작하기</button>
        </section>
    
        <section id="qna">
            <div class="status">
                <div class="statusBar">

                </div>
            </div>
            <div class="num"></div>
            <div class="qBox">

            </div>
            <div class="answerBox">

            </div>
        </section>
    
        <section id="result">
            <div class="resultBox">
                <div id="resultImg">
  
                </div>
                <h5>나의 소비유형은</h5>
                <div class="resultName">

                </div>
                
                <div class="resultDesc">

                </div>      
            </div>
            <button type="button" class="btn btn-dark btnShare">공유하기</button>
        </section>
        <script src="./js/data.js" charset="UTF-8"></script>
        <script src="./js/start.js" charset="UTF-8"></script>
    </div>

</body>
</html>
